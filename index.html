<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRTLC Nexus Parser</title>
    <style>
        :root {
            --bg-dark: #0f1015;
            --panel-bg: #14151c;
            --accent-cyan: #00ffd0;
            --accent-purple: #8a2be2;
            --text-main: #ffffff;
            --text-dim: #969ba2;
            --border-color: #2d303e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .nexus-wrapper {
            width: 100%;
            max-width: 950px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .header-section {
            text-align: center;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--text-main), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header-section p {
            color: var(--text-dim);
            font-size: 14px;
        }

        /* Drag & Drop Upload Zone */
        .upload-container {
            border: 2px dashed #1a75ff;
            background: rgba(26, 117, 255, 0.03);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-container:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 255, 208, 0.02);
        }

        /* CSS Rendered Custom Vector File Icon (No External Assets Required) */
        .file-vector-icon {
            width: 40px;
            height: 48px;
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
            position: relative;
            margin-bottom: 15px;
            background: rgba(0, 255, 208, 0.05);
            box-shadow: 0 0 10px rgba(0, 255, 208, 0.2);
        }

        .file-vector-icon::before {
            content: "";
            position: absolute;
            top: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: var(--panel-bg);
            border-left: 2px solid var(--accent-cyan);
            border-bottom: 2px solid var(--accent-cyan);
            border-top-right-radius: 2px;
        }

        .upload-container input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Progress Bar Matrix */
        .progress-track {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background: #1e2030;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1a75ff, var(--accent-purple));
            transition: width 0.4s ease;
        }

        /* Action Controls Layout */
        .control-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        .compile-btn {
            background: var(--border-color);
            color: var(--text-main);
            border: 1px solid transparent;
            padding: 12px 35px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            cursor: not-allowed;
            opacity: 0.5;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .compile-btn.active {
            background: #1e2030;
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            cursor: pointer;
            opacity: 1;
            box-shadow: 0 0 15px rgba(0, 255, 208, 0.2);
        }

        .compile-btn.active:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 255, 208, 0.4);
        }

        /* Workspace Grid Splitter */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            gap: 20px;
            min-height: 300px;
        }

        @media (max-width: 768px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
            .center-status-block {
                order: -1;
                padding: 20px 0;
            }
        }

        .panel-box {
            background: #0d0e12;
            border: 1px solid #1c1d26;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #14151c;
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            border-bottom: 1px solid #1c1d26;
            letter-spacing: 0.5px;
        }

        /* Explorer Tree Element Container */
        .tree-viewport {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            font-family: 'Courier New', Courier, monospace;
            max-height: 320px;
        }

        /* Live Code Display Container */
        .code-viewport {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 15px;
            resize: none;
            outline: none;
            line-height: 1.5;
            flex-grow: 1;
            max-height: 320px;
        }

        /* Center Ring Layout Section */
        .center-status-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        .radial-progress {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-purple) 0deg, #1c1d26 0deg);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .radial-progress::before {
            content: "";
            position: absolute;
            width: 56px;
            height: 56px;
            background: var(--panel-bg);
            border-radius: 50%;
        }

        .radial-percentage {
            position: relative;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        .status-tag {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="nexus-wrapper">
        <div class="header-section">
            <h1>Nexus Parser</h1>
            <p>Convert RBXM to RBXMX Asset Layout Arrays</p>
        </div>

        <div class="upload-container" id="drop-zone">
            <div class="file-vector-icon"></div>
            <p style="font-weight: 600; margin-bottom: 4px;">Load your file here</p>
            <p style="color: var(--text-dim); font-size: 12px;">Supports binary .rbxm asset payloads</p>
            <input type="file" id="file-input" accept=".rbxm,.rbxmx">
            <div class="progress-track">
                <div class="progress-bar" id="load-progress"></div>
            </div>
        </div>

        <div class="control-row">
            <button class="compile-btn" id="main-compile-btn" disabled onclick="executeNexusCompilation()">COMPILE SOURCE CHUNKS</button>
        </div>

        <div class="workspace-grid">
            <div class="panel-box">
                <div class="panel-header">STRUCTURAL TREE HIERARCHY</div>
                <div class="tree-viewport" id="tree-view">
                    <span style="color: var(--text-dim); font-style: italic;">No structural elements loaded.</span>
                </div>
            </div>

            <div class="center-status-block">
                <div class="radial-progress" id="radial-track">
                    <span class="radial-percentage" id="radial-text">0%</span>
                </div>
                <span class="status-tag" id="status-string">Idle Mode</span>
            </div>

            <div class="panel-box">
                <div class="panel-header">SOURCE CODE STREAM PREVIEW</div>
                <textarea class="code-viewport" id="code-preview-box" readonly placeholder="-- Click a structural script instance component to reveal code matrix streams..."></textarea>
            </div>
        </div>
    </div>

    <script src="nexus-parser.js?v=1"></script>
    <script>
        const fileIn = document.getElementById('file-input');
        const compBtn = document.getElementById('main-compile-btn');
        const progBar = document.getElementById('load-progress');
        const radialTrack = document.getElementById('radial-track');
        const radialTxt = document.getElementById('radial-text');
        const statusStr = document.getElementById('status-string');

        fileIn.addEventListener('change', () => {
            if(fileIn.files.length > 0) {
                compBtn.classList.add('active');
                compBtn.removeAttribute('disabled');
                progBar.style.width = "40%";
                statusStr.innerText = "Staged";
                statusStr.style.color = "#1a75ff";
            }
        });

        const originalCompile = window.executeNexusCompilation;
        window.executeNexusCompilation = async function() {
            progBar.style.width = "100%";
            statusStr.innerText = "Parsing...";
            statusStr.style.color = "#8a2be2";
            
            let p = 0;
            let interval = setInterval(() => {
                p += 10;
                radialTxt.innerText = p + "%";
                radialTrack.style.background = `conic-gradient(var(--accent-purple) ${p * 3.6}deg, #1c1d26 0deg)`;
                if(p >= 100) {
                    clearInterval(interval);
                    statusStr.innerText = "Finished";
                    statusStr.style.color = "var(--accent-cyan)";
                }
            }, 50);

            if(originalCompile) await originalCompile();
        }
    </script>
</body>
</html>
